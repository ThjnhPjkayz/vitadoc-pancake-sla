<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow circles -->
  <circle cx="900" cy="150" r="300" fill="rgba(16,185,129,0.05)"/>
  <circle cx="1100" cy="500" r="200" fill="rgba(6,182,212,0.04)"/>

  <!-- Accent line -->
  <rect x="80" y="180" width="56" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="80" y="280" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#f8fafc" letter-spacing="-1">Pancake SLA Monitor</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#94a3b8">Internal dashboard theo dõi hiệu suất phản hồi tin nhắn trên các trang Pancake</text>

  <!-- Pills -->
  <!-- SLA Tracking -->
  <rect x="80" y="390" width="168" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="164" y="415" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">SLA Tracking</text>

  <!-- Page Leaderboard -->
  <rect x="264" y="390" width="196" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="362" y="415" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">Page Leaderboard</text>

  <!-- Inbox & Comments -->
  <rect x="476" y="390" width="196" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="574" y="415" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">Inbox &amp; Comments</text>

  <!-- VI EN ZH -->
  <rect x="688" y="390" width="130" height="40" rx="20" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="753" y="415" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#cbd5e1" text-anchor="middle">VI · EN · ZH</text>

  <!-- Bottom domain -->
  <text x="80" y="570" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="rgba(148,163,184,0.5)">pancake-sla-tool.railway.app</text>

  <!-- Right side - decorative stats card -->
  <rect x="820" y="220" width="300" height="160" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="848" y="258" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#64748b">SLA Success Rate</text>
  <text x="848" y="310" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#10b981">94.2%</text>
  <text x="848" y="348" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#64748b">↑ 2.1% so với tuần trước</text>

  <rect x="820" y="400" width="140" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="848" y="428" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#64748b">Avg Response</text>
  <text x="848" y="460" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">8.4m</text>

  <rect x="976" y="400" width="144" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1004" y="428" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#64748b">Violations</text>
  <text x="1004" y="460" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ef4444">12</text>
</svg>
